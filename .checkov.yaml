# ==============================================================================
# Checkov / Prisma Cloud configuration — GitHub Actions build-integrity policies
# ==============================================================================
# Phase 4.3. Run with:  checkov -d .github/workflows --config-file .checkov.yaml
#
# CKV_GHA_7 ("The build output cannot be affected by user parameters, other than
# the build entry points and the top-level command") is INTENTIONALLY skipped for
# this repository. The Salesforce Quality Gate Orchestrator and the no-op probe
# deliberately expose `workflow_dispatch` inputs (target_env, test_level,
# specified_tests, bypass_code_scanners) so developers can choose a test level.
#
# Compensating controls that make this exception safe:
#   - Inputs are strictly typed (choice / boolean / string).
#   - Untrusted PR text is parsed only via jq from $GITHUB_EVENT_PATH and passed
#     through environment variables — never interpolated into a `run:` block.
#   - A policy matrix rejects disallowed level/environment combinations.
#   - The 8 KB --tests guardrail blocks oversized headers.
# Review this exception during each SecOps audit.

framework:
  - github_actions

skip-check:
  - CKV_GHA_7   # Parameterized test-level selection is a required product feature.

compact: true
quiet: true
