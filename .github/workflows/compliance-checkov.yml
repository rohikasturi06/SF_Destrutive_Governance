name: Compliance - Checkov (GitHub Actions policies)

# ==============================================================================
# Phase 4.3 — Execute the Checkov / Prisma Cloud build-integrity scan.
#
# Verifies the workflows conform to GitHub Actions security policies (e.g.
# CKV_GHA_*). The CKV_GHA_7 exception (parameterized workflow_dispatch inputs)
# is documented and skipped in .checkov.yaml. This workflow only RUNS the scan;
# the policy decisions live in that config file.
# ==============================================================================

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.checkov.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.checkov.yaml'

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: pip install --upgrade checkov

      - name: Run Checkov on GitHub Actions workflows
        run: |
          checkov \
            --directory .github/workflows \
            --config-file .checkov.yaml \
            --output cli \
            --output junitxml \
            --output-file-path console,checkov-report.xml

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report-${{ github.run_id }}
          path: checkov-report.xml
          retention-days: 30
          if-no-files-found: warn
