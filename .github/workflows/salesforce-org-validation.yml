name: Salesforce Org Validation

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, main]
    paths:
      - "src/salesforce/**"
      - "scripts/shell/validate-org.sh"
      - ".github/workflows/salesforce-org-validation.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sf-org-validation-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  SF_ALIAS: ci-org

jobs:
  validate-org:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Prepare auth file
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          if [ -z "$SF_AUTH_URL" ]; then
            echo "SF_AUTH_URL is not set."
            exit 1
          fi
          printf "%s" "$SF_AUTH_URL" > sfdx_auth_url.txt
          chmod 600 sfdx_auth_url.txt

      - name: Authenticate and display org
        run: |
          sf org login sfdx-url --sfdx-url-file sfdx_auth_url.txt --alias "$SF_ALIAS" --set-default --json
          sf org display --target-org "$SF_ALIAS" --verbose --json

      - name: Validate deploy (check-only)
        run: bash scripts/shell/validate-org.sh

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org-validation-${{ github.run_id }}
          path: reports/
