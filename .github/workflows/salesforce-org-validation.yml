name: Salesforce Org Validation

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, main]
    paths:
      - "src/salesforce/**"
      - "scripts/shell/validate-org.sh"
      - ".github/workflows/salesforce-org-validation.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sf-org-validation-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  SF_ALIAS: ci-org
  SF_DISABLE_TELEMETRY: "true"
  SFDX_DISABLE_TELEMETRY: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-org:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Prepare auth file
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          if [ -z "$SF_AUTH_URL" ]; then
            echo "SF_AUTH_URL is not set."
            exit 1
          fi
          printf "%s" "$SF_AUTH_URL" > sfdx_auth_url.txt
          chmod 600 sfdx_auth_url.txt

      - name: Authenticate (sanitized logs)
        run: |
          sf org login sfdx-url --sfdx-url-file sfdx_auth_url.txt --alias "$SF_ALIAS" --set-default >/dev/null 2>&1
          sf org display --target-org "$SF_ALIAS" >/dev/null 2>&1
          echo "Salesforce org authentication succeeded for alias: $SF_ALIAS"

      - name: Validate deploy (check-only)
        run: bash scripts/shell/validate-org.sh

      - name: Publish executive summary
        if: always()
        run: |
          if [ -f reports/executive-summary.md ]; then
            cat reports/executive-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Validation Executive Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- No executive summary generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post executive summary to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SUMMARY_PATH: reports/executive-summary.md
        with:
          script: |
            const fs = require('fs');
            const summaryPath = process.env.SUMMARY_PATH;
            let body = "## Validation Executive Summary\n\nNo summary file generated.";
            if (fs.existsSync(summaryPath)) {
              body = fs.readFileSync(summaryPath, 'utf8');
            }
            body = `${body}\n\n_Run: ${context.runId}_`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: org-validation-${{ github.run_id }}
          path: reports/
