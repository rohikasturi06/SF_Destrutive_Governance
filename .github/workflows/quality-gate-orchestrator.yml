name: Salesforce Quality Gate Orchestrator

# ==============================================================================
# Parameterized, metadata-driven Salesforce TEST-LEVEL EXECUTION pipeline.
#
# Lets developers choose the Apex test execution level dynamically from any of:
#   1. workflow_dispatch form  (typed choice/boolean/string)   <- manual runs
#   2. Applied PR label        (test-level:<Level>)
#   3. Checked PR checkbox      (.github/pull_request_template.md)
#   4. RunLocalTests           (safe default)
#
# Engine (scripts/):
#   resolve_test_parameters.sh -> picks level/tests/env + enforces guardrails
#   run_validation.sh          -> NoTestRun => deploy start --dry-run,
#                                 others    => deploy validate --test-level X
#   check_coverage.sh          -> coverage validation (Jenkins validate() parity)
#
# Guardrails: sandbox/prod policy matrix, 8 KB --tests header cap, injection-safe
# parsing (untrusted text only via env vars + jq).
# ==============================================================================

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
    branches:
      - dev
      - qa
      - intuat
      - main
      - 'release/**'
    paths:
      - 'force-app/**'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target Salesforce Environment'
        required: true
        type: choice
        options:
          - sandbox-dev
          - sandbox-uat
          - production
        default: 'sandbox-dev'
      test_level:
        description: 'Salesforce Apex Test Level'
        required: true
        type: choice
        options:
          - NoTestRun
          - RunSpecifiedTests
          - RunLocalTests
          - RunAllTestsInOrg
        default: 'RunLocalTests'
      specified_tests:
        description: 'Target test classes (comma/space-separated; required for RunSpecifiedTests)'
        required: false
        type: string
        default: ''
      bypass_code_scanners:
        description: 'Bypass Static Code Quality Scanners? (generates a warning in the logs)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: quality-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # JOB 1 — Resolve & validate the test level before any org is touched.
  # ----------------------------------------------------------------------------
  resolve-parameters:
    name: Resolve Target Parameters
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.pull_request.title, '[skip ci]')
    outputs:
      test_level: ${{ steps.resolve.outputs.TEST_LEVEL }}
      specified_tests: ${{ steps.resolve.outputs.SPECIFIED_TESTS }}
      execution_mode: ${{ steps.resolve.outputs.EXECUTION_MODE }}
      target_env: ${{ steps.resolve.outputs.TARGET_ENV }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      # Untrusted PR text reaches the script ONLY through environment variables
      # and $GITHUB_EVENT_PATH — never interpolated into a run line.
      - name: Resolve & Validate Parameters
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          INPUT_TEST_LEVEL: ${{ github.event.inputs.test_level }}
          INPUT_SPECIFIED_TESTS: ${{ github.event.inputs.specified_tests }}
          INPUT_TARGET_ENV: ${{ github.event.inputs.target_env }}
        run: |
          chmod +x ./scripts/resolve_test_parameters.sh
          ./scripts/resolve_test_parameters.sh

      - name: Summary
        run: |
          {
            echo "### 🧭 Resolved Test Execution Parameters"
            echo ""
            echo "| Parameter | Value |"
            echo "| --- | --- |"
            echo "| Test Level | \`${{ steps.resolve.outputs.TEST_LEVEL }}\` |"
            echo "| Execution Mode | \`${{ steps.resolve.outputs.EXECUTION_MODE }}\` |"
            echo "| Target Environment | \`${{ steps.resolve.outputs.TARGET_ENV }}\` |"
            echo "| Specified Tests | \`${{ steps.resolve.outputs.SPECIFIED_TESTS || 'n/a' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ----------------------------------------------------------------------------
  # JOB 2 — Authenticate and execute the resolved validation against the org.
  # ----------------------------------------------------------------------------
  execute-salesforce-validation:
    name: Execute Validation
    needs: resolve-parameters
    runs-on: ubuntu-latest
    env:
      TEST_LEVEL: ${{ needs.resolve-parameters.outputs.test_level }}
      SPECIFIED_TESTS: ${{ needs.resolve-parameters.outputs.specified_tests }}
      EXECUTION_MODE: ${{ needs.resolve-parameters.outputs.execution_mode }}
      TARGET_ENV: ${{ needs.resolve-parameters.outputs.target_env }}
      COVERAGE_THRESHOLD: '75'
      BYPASS_SCANNERS: ${{ github.event.inputs.bypass_code_scanners }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Scanner Bypass Notice
        if: env.BYPASS_SCANNERS == 'true'
        run: echo "::warning::Static code quality scanners were bypassed by manual request for this run."

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Cache Salesforce CLI
        uses: actions/cache@v4
        with:
          path: ~/.sf
          key: sf-cli-${{ runner.os }}-${{ hashFiles('**/sfdx-project.json') }}
          restore-keys: |
            sf-cli-${{ runner.os }}-

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli --silent
          sf --version

      # Auth: reuse the per-environment SFDX auth URL secrets this repo already
      # uses (DEV/QA/INTUAT), selected by the PR's base branch or the dispatch
      # target_env. Falls back to DEVHUB_SFDX_URL, then to the JWT flow.
      - name: Authenticate Target Environment
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || github.ref_name }}
          DEV_SF_AUTH_URL: ${{ secrets.DEV_SF_AUTH_URL }}
          QA_SF_AUTH_URL: ${{ secrets.QA_SF_AUTH_URL }}
          INTUAT_SF_AUTH_URL: ${{ secrets.INTUAT_SF_AUTH_URL }}
          PROD_SF_AUTH_URL: ${{ secrets.PROD_SF_AUTH_URL }}
          DEVHUB_SFDX_URL: ${{ secrets.DEVHUB_SFDX_URL }}
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
        run: |
          set -euo pipefail
          ALIAS="target-org"

          # Pick the SFDX auth URL by base branch (PR) or target env (dispatch).
          case "$BASE_REF" in
            dev|refs/heads/dev)        SFDX_AUTH_URL="$DEV_SF_AUTH_URL" ;;
            qa|refs/heads/qa)          SFDX_AUTH_URL="$QA_SF_AUTH_URL" ;;
            intuat|refs/heads/intuat)  SFDX_AUTH_URL="$INTUAT_SF_AUTH_URL" ;;
            main|refs/heads/main)      SFDX_AUTH_URL="${PROD_SF_AUTH_URL:-$DEVHUB_SFDX_URL}" ;;
            *)
              case "$TARGET_ENV" in
                production)  SFDX_AUTH_URL="${PROD_SF_AUTH_URL:-$DEVHUB_SFDX_URL}" ;;
                sandbox-uat) SFDX_AUTH_URL="${INTUAT_SF_AUTH_URL:-$QA_SF_AUTH_URL}" ;;
                *)           SFDX_AUTH_URL="${DEV_SF_AUTH_URL:-$DEVHUB_SFDX_URL}" ;;
              esac
              ;;
          esac
          # Final fallback to the generic dev-hub URL.
          SFDX_AUTH_URL="${SFDX_AUTH_URL:-$DEVHUB_SFDX_URL}"

          if [ "$TARGET_ENV" = "production" ]; then
            LOGIN_URL="https://login.salesforce.com"
          else
            LOGIN_URL="https://test.salesforce.com"
          fi

          if [ -n "${SFDX_AUTH_URL:-}" ]; then
            echo "🔐 Authenticating via stored SFDX auth URL (base=$BASE_REF, env=$TARGET_ENV)"
            AUTH_FILE="$(mktemp)"
            printf '%s' "$SFDX_AUTH_URL" > "$AUTH_FILE"
            if ! grep -q '^force://' "$AUTH_FILE"; then
              echo "::error::Selected SFDX auth URL is not valid (must start with force://). Check the *_SF_AUTH_URL secret for this branch/env."
              rm -f "$AUTH_FILE"; exit 1
            fi
            sf org login sfdx-url --sfdx-url-file "$AUTH_FILE" --set-default --alias "$ALIAS"
            rm -f "$AUTH_FILE"
          elif [ -n "${SF_JWT_KEY:-}" ] && [ -n "${SF_CONSUMER_KEY:-}" ] && [ -n "${SF_USERNAME:-}" ]; then
            echo "🔐 Authenticating via JWT bearer flow"
            KEY_FILE="$(mktemp)"
            printf '%s' "$SF_JWT_KEY" > "$KEY_FILE"
            sf org login jwt \
              --client-id "$SF_CONSUMER_KEY" \
              --jwt-key-file "$KEY_FILE" \
              --username "$SF_USERNAME" \
              --instance-url "$LOGIN_URL" \
              --set-default --alias "$ALIAS"
            rm -f "$KEY_FILE"
          else
            echo "::error::No authentication secret found for base '$BASE_REF' / env '$TARGET_ENV'. Set DEV_SF_AUTH_URL / QA_SF_AUTH_URL / INTUAT_SF_AUTH_URL / PROD_SF_AUTH_URL / DEVHUB_SFDX_URL, or the JWT secrets."
            exit 1
          fi

          sf org display --target-org "$ALIAS" --json | jq -r '"✅ Authenticated: " + (.result.username // "n/a") + " @ " + (.result.instanceUrl // "n/a")'

      - name: Execute Validation
        run: |
          chmod +x ./scripts/run_validation.sh
          ./scripts/run_validation.sh

      # Coverage validation mirrors the reference Jenkinsfile validate(): the
      # threshold is the SOFT overall-coverage warning level; the build only
      # hard-fails on codeCoverageWarnings or test failures.
      - name: Validate Code Coverage (Jenkins validate() parity)
        if: always()
        run: |
          chmod +x ./scripts/check_coverage.sh
          ./scripts/check_coverage.sh

      - name: Upload Coverage & Validation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sf-validation-coverage-${{ github.run_id }}
          path: |
            reports/validate-report.json
            reports/coverage/
          retention-days: 30
          if-no-files-found: warn
